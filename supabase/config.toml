
# Analytics (Logflare) deshabilitado en local: en Windows requiere exponer el
# Docker daemon en tcp://localhost:2375 y provoca el fallo "_supabase does not
# exist". No es necesario para desarrollo. Reactivar solo si se necesita.
[analytics]
enabled = false

[functions.add-subscriber]
enabled = true
verify_jwt = true
import_map = "./functions/add-subscriber/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/add-subscriber/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/add-subscriber/*.html" ]

[functions.agent]
enabled = true
verify_jwt = false
entrypoint = "./functions/agent/index.ts"
